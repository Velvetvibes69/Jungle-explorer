<!DOCTYPE html>
<html>

<head>
    <title>Jungle Carousel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        nav {
            background: rgb(3, 64, 3);
            padding: 15px;
            position: fixed;
            width: 100%;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 18px;
        }

        nav a.active {
            color: rgb(134, 134, 8);
        }

        section {
            height: 100vh;
            padding-top: 80px;
            text-align: center;
        }

        #home {
            background: #96b38a;
        }

        #animals {
            background: #b5d9b3;
        }

        #forest {
            background: #4b5d4b;
        }

        .carousel {
            width: 600px;
            margin: auto;
        }

        .carousel img {
            width: 100%;
            height: 350px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
        }
    </style>

</head>

<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#animals">Animals</a>
        <a href="#forest">Forest</a>
    </nav>

    <section id="home">

        <h1>Welcome to the Jungle</h1>

        <div class="carousel">

            <img id="slide" src="jungle1.jpg">

            <br>

            <button onclick="previous()">Previous</button>
            <button onclick="next()">Next</button>

        </div>

    </section>

    <section id="animals">
        <h1>Jungle Animals</h1>
        <p>Lions, tigers, monkeys, parrots and more!</p>
    </section>

    <section id="forest">
        <h1>Rainforest</h1>
        <p>Enjoy the beautiful green rainforest.</p>
    </section>

    <script>

        var images = [
            "jungle1.jpg",
            "jungle2.jpg",
            "jungle3.jpg"
        ];

        var index = 0;

        function next() {
            index++;
            if (index >= images.length) {
                index = 0;
            }
            document.getElementById("slide").src = images[index];
        }

        function previous() {
            index--;
            if (index < 0) {
                index = images.length - 1;
            }
            document.getElementById("slide").src = images[index];
        }

        // Scrollspy
        var links = document.querySelectorAll("nav a");
        var sections = document.querySelectorAll("section");

        window.onscroll = function () {

            var current = "";

            sections.forEach(function (section) {

                if (pageYOffset >= section.offsetTop - 100) {
                    current = section.getAttribute("id");
                }

            });

            links.forEach(function (link) {

                link.classList.remove("active");

                if (link.getAttribute("href") == "#" + current) {
                    link.classList.add("active");
                }

            });

        }

    </script>

</body>

</html>
